; PlatformIO Project Configuration for C-Bus ESP32 Bridge
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev
; To use a specific board, create platformio_override.ini with:
;   [platformio]
;   default_envs = lolin_d32_pro
;   [env:lolin_d32_pro]
;   upload_port = /dev/cu.usbserial-XXXXX
;   monitor_port = /dev/cu.usbserial-XXXXX

; ---- Common ESP32 settings ----
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DPLATFORM_ESP32
build_unflags = -std=gnu++11
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7
lib_extra_dirs = lib

; ---- Lolin D32 Pro ----
[env:lolin_d32_pro]
platform = espressif32
board = lolin_d32
framework = arduino
monitor_speed = 115200
build_flags =
    -DPLATFORM_ESP32
build_unflags = -std=gnu++11
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7
lib_extra_dirs = lib

; ---- ESP32 QEMU Test Build (serial-based C-Bus protocol) ----
[env:esp32qemu]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DPLATFORM_ESP32
    -DCBUS_QEMU_TEST_MODE
    -std=gnu++17
build_unflags = -std=gnu++11
lib_extra_dirs = lib

; ---- Native Host Build (for unit tests) ----
[env:native]
platform = native
build_flags =
    -DPLATFORM_NATIVE
    -std=c++17
test_framework = unity
test_filter = test_protocol
